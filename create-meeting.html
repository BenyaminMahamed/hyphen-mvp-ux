<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Meeting — Ops Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="nav"></header>

  <main>
    <h1>New Meeting</h1>

    <form id="create-meeting-form">
      <label>Title
        <input type="text" name="title" required>
      </label>

      <label>Date
        <input type="date" name="date" required>
      </label>

      <label>Notes
        <textarea name="notes" rows="8" placeholder="Paste meeting notes here..."></textarea>
      </label>

      <button type="button" id="generate-ai-btn" class="secondary">Generate Summary + Action Items (AI)</button>

      <div id="ai-preview"></div>

      <button type="submit">Save Meeting</button>
    </form>
  </main>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/create-meeting.js"></script>
</body>
</html>
